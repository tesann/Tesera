[project]
name = "tes-core"
version = "0.1.0"
description = "Core SDK for Tesera — cryptographic media provenance"
requires-python = ">=3.10"
dependencies = ["cryptography", "python-magic", "typer>=0.12"]

[project.scripts]
tesera = "tes_core.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tes_core"]
